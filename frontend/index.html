<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Waitlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    input {
      padding: 12px;
      width: 70%;
      border: none;
      border-radius: 6px;
      margin-right: 8px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #message {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Join the Waitlist</h1>
  <p>Be the first to get access.</p>

  <form id="form">
    <input type="email" id="email" placeholder="Enter your email" required />
    <button type="submit">Join</button>
  </form>

  <div id="message"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const message = document.getElementById("message");

  message.textContent = "Loading...";

  try {
    const res = await fetch("https://inthealth.onrender.com", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (res.ok) {
      message.textContent = "You're on the list 🎉";
    } else {
      message.textContent = data.error;
    }
  } catch (err) {
    message.textContent = "Something went wrong.";
  }
});
</script>

</body>
</html>
